# Trio Nano Config — Mac Mini (4GB RAM, CPU only)
# ~1M parameters — trains in hours on CPU

model_name: trio-nano
version: 0.1.0

# Architecture
vocab_size: 10000
context_length: 256
d_model: 128
num_heads: 4
num_layers: 4
ff_dim: 512
dropout: 0.1
bias: false
use_rope: true
rope_base: 10000
use_swiglu: true
num_kv_heads: null

# Training
batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 0.0003
weight_decay: 0.1
max_iters: 5000
warmup_iters: 200
eval_interval: 250
eval_iters: 50
save_interval: 500
grad_clip: 1.0

# Paths
data_dir: data/corpus
checkpoint_dir: checkpoints
log_dir: logs

# Device (CPU for Mac Mini 2016)
device: cpu
dtype: float32
constitution_path: training/constitution.md
