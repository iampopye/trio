version: 2

updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    reviewers:
      - "iampopye"
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    groups:
      python-dev:
        patterns:
          - "pytest*"
          - "ruff"
          - "black"
          - "mypy"
      python-runtime:
        patterns:
          - "aiohttp"
          - "rich"
          - "prompt-toolkit"
          - "cryptography"
          - "python-dotenv"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    reviewers:
      - "iampopye"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
      - "automated"
