<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trio.ai</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111;
    --chat-bg: #111;
    --input-bg: #1a1a1a;
    --input-border: #333;
    --input-focus: #555;
    --text: #eee;
    --text-secondary: #888;
    --accent: #7c6ef6;
    --user-bubble: #2a2a2a;
    --bot-text: #ddd;
    --divider: #222;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--divider);
    flex-shrink: 0;
  }

  .brand {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .brand span { color: var(--accent); font-weight: 700; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .model-tag {
    font-size: 11px;
    color: var(--text-secondary);
    background: #1a1a1a;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--divider);
  }

  .new-chat-btn {
    background: none;
    border: 1px solid var(--input-border);
    color: var(--text-secondary);
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .new-chat-btn:hover { color: var(--text); border-color: var(--input-focus); }

  /* Chat */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 0;
  }

  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .chat::-webkit-scrollbar-track { background: transparent; }

  /* Welcome */
  .welcome {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px;
  }

  .welcome-mark {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: linear-gradient(135deg, #7c6ef6 0%, #a78bfa 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .welcome h1 {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .welcome p {
    font-size: 13px;
    color: var(--text-secondary);
    text-align: center;
    max-width: 340px;
    line-height: 1.6;
  }

  .suggestions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 4px;
  }

  .suggestions button {
    background: var(--input-bg);
    border: 1px solid var(--divider);
    color: var(--text-secondary);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .suggestions button:hover {
    color: var(--text);
    border-color: var(--input-border);
  }

  /* Messages */
  .messages { max-width: 680px; margin: 0 auto; padding: 20px 20px 0; }

  .msg {
    margin-bottom: 24px;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    color: var(--text-secondary);
  }

  .msg-label.you { color: var(--accent); }

  .msg-body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--bot-text);
    word-wrap: break-word;
  }

  .msg.user .msg-body {
    color: var(--text);
  }

  .msg-body pre {
    background: #0a0a0a;
    border: 1px solid var(--divider);
    border-radius: 6px;
    padding: 12px 14px;
    margin: 10px 0;
    overflow-x: auto;
    font-size: 12.5px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    line-height: 1.5;
  }

  .msg-body code {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: rgba(124, 110, 246, 0.1);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12.5px;
  }

  .msg-body pre code { background: none; padding: 0; }

  .msg-body p { margin-bottom: 8px; }
  .msg-body p:last-child { margin-bottom: 0; }

  .msg-body ul, .msg-body ol { padding-left: 20px; margin: 8px 0; }
  .msg-body li { margin-bottom: 4px; }

  .msg-body strong { color: var(--text); }

  /* Typing */
  .typing {
    display: inline-flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing span {
    width: 5px;
    height: 5px;
    background: var(--text-secondary);
    border-radius: 50%;
    animation: pulse 1s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Input */
  .input-area {
    flex-shrink: 0;
    padding: 12px 20px 16px;
  }

  .input-wrap {
    max-width: 680px;
    margin: 0 auto;
    position: relative;
  }

  .input-box {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 12px;
    padding: 12px 48px 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 180px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  .input-box:focus { border-color: var(--input-focus); }
  .input-box::placeholder { color: #555; }

  .send-btn {
    position: absolute;
    right: 8px;
    bottom: 8px;
    width: 32px;
    height: 32px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
  }

  .send-btn:disabled { opacity: 0.3; cursor: default; }
  .send-btn:hover:not(:disabled) { opacity: 0.85; }

  .send-btn svg { width: 16px; height: 16px; color: #fff; }

  .footnote {
    text-align: center;
    font-size: 10px;
    color: #444;
    margin-top: 8px;
  }

  @media (max-width: 600px) {
    .messages { padding: 16px 16px 0; }
    .input-area { padding: 10px 12px 14px; }
    header { padding: 0 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">trio<span>.ai</span></div>
  <div class="header-right">
    <div class="model-tag" id="modelTag">loading...</div>
    <button class="new-chat-btn" onclick="clearChat()">New chat</button>
  </div>
</header>

<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-mark">t</div>
    <h1>What can I help with?</h1>
    <p>I can code, write, analyze, research, and more. Powered by trio-max running locally on your machine.</p>
    <div class="suggestions">
      <button onclick="ask('Explain how async/await works in Python')">Async/await in Python</button>
      <button onclick="ask('Write a REST API with FastAPI')">Build a REST API</button>
      <button onclick="ask('What are the best practices for Git branching?')">Git best practices</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea class="input-box" id="input" rows="1" placeholder="Ask anything..."
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,180)+'px'"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
  <div class="footnote">trio.ai -- local AI, no cloud required</div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const welcome = document.getElementById('welcome');
let sid = Date.now().toString(36) + Math.random().toString(36).slice(2);
let busy = false;
let messagesDiv = null;

function ensureMessages() {
  if (!messagesDiv) {
    messagesDiv = document.createElement('div');
    messagesDiv.className = 'messages';
    chat.appendChild(messagesDiv);
  }
}

function addMsg(role, html) {
  if (welcome && welcome.parentNode) welcome.remove();
  ensureMessages();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="msg-label' + (role === 'user' ? ' you' : '') + '">' +
    (role === 'user' ? 'You' : 'trio') + '</div><div class="msg-body">' + html + '</div>';
  messagesDiv.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div.querySelector('.msg-body');
}

function showTyping() {
  if (welcome && welcome.parentNode) welcome.remove();
  ensureMessages();
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing';
  div.innerHTML = '<div class="msg-label">trio</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>';
  messagesDiv.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function fmt(t) {
  t = t.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\n\n/g, '</p><p>');
  t = t.replace(/\n/g, '<br>');
  return '<p>' + t + '</p>';
}

function ask(text) { input.value = text; send(); }

async function send() {
  const text = input.value.trim();
  if (!text || busy) return;
  busy = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  addMsg('user', fmt(text));
  showTyping();

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, session_id: sid}),
    });

    hideTyping();

    if (!res.ok) { addMsg('assistant', '<p>Error: server returned ' + res.status + '</p>'); return; }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let full = '';
    const body = addMsg('assistant', '');

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      for (const line of dec.decode(value, {stream: true}).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.done) break;
          if (d.error) full += ' [Error: ' + d.error + ']';
          else if (d.text) full += d.text;
          body.innerHTML = fmt(full);
          chat.scrollTop = chat.scrollHeight;
        } catch(e) {}
      }
    }
  } catch(e) {
    hideTyping();
    addMsg('assistant', '<p>Connection error. Make sure the server is running.</p>');
  } finally {
    busy = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

function clearChat() {
  if (messagesDiv) { messagesDiv.remove(); messagesDiv = null; }
  chat.innerHTML = '<div class="welcome" id="welcome"><div class="welcome-mark">t</div><h1>What can I help with?</h1><p>I can code, write, analyze, research, and more.</p><div class="suggestions"><button onclick="ask(\'Explain async/await in Python\')">Async/await</button><button onclick="ask(\'Write a REST API with FastAPI\')">REST API</button><button onclick="ask(\'Git best practices\')">Git tips</button></div></div>';
  sid = Date.now().toString(36) + Math.random().toString(36).slice(2);
  fetch('/api/sessions/clear', {method: 'POST'});
}

fetch('/api/status').then(r=>r.json()).then(d=>{
  document.getElementById('modelTag').textContent = d.model;
}).catch(()=>{
  document.getElementById('modelTag').textContent = 'offline';
});

input.focus();
</script>
</body>
</html>
