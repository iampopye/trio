<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trio.ai</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --user-bg: #1e1b4b;
    --assistant-bg: #141414;
    --green: #22c55e;
    --red: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 14px;
    color: white;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    background: var(--surface-2);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .header-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }

  .header-btn:hover {
    background: var(--border);
    color: var(--text);
  }

  /* ── Chat Area ──────────────────────────────── */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scroll-behavior: smooth;
  }

  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    gap: 16px;
  }

  .welcome-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: white;
    margin-bottom: 8px;
  }

  .welcome h2 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .welcome p {
    color: var(--text-dim);
    max-width: 400px;
    line-height: 1.5;
  }

  .quick-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 12px;
  }

  .quick-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }

  .quick-btn:hover {
    background: var(--border);
    color: var(--text);
    border-color: var(--accent);
  }

  /* ── Messages ───────────────────────────────── */
  .message {
    max-width: 800px;
    margin: 0 auto 16px;
    display: flex;
    gap: 12px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message-avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .message-avatar.user {
    background: var(--accent);
    color: white;
  }

  .message-avatar.assistant {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
  }

  .message-content {
    flex: 1;
    padding: 12px 16px;
    border-radius: 12px;
    line-height: 1.6;
    font-size: 14px;
    word-wrap: break-word;
  }

  .message.user .message-content {
    background: var(--user-bg);
    border: 1px solid #312e81;
  }

  .message.assistant .message-content {
    background: var(--surface-2);
    border: 1px solid var(--border);
  }

  .message-content pre {
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-size: 13px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
  }

  .message-content code {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    background: rgba(99, 102, 241, 0.15);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }

  .message-content pre code {
    background: none;
    padding: 0;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 4px 0;
  }

  .typing-indicator span {
    width: 6px;
    height: 6px;
    background: var(--text-dim);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── Input Area ─────────────────────────────── */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-wrapper {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 200px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  .input-box:focus {
    border-color: var(--accent);
  }

  .input-box::placeholder {
    color: var(--text-dim);
  }

  .send-btn {
    background: var(--accent);
    border: none;
    color: white;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .send-btn svg {
    width: 18px;
    height: 18px;
  }

  .footer-text {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── Responsive ─────────────────────────────── */
  @media (max-width: 640px) {
    header { padding: 10px 16px; }
    .chat-container { padding: 12px; }
    .input-area { padding: 12px 16px 16px; }
    .message-content { padding: 10px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">t</div>
    <div class="logo-text">trio<span>.ai</span></div>
  </div>
  <div class="status-badge">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Connected</span>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="clearChat()">New Chat</button>
    <button class="header-btn" onclick="showSettings()">Settings</button>
  </div>
</header>

<div class="chat-container" id="chatContainer">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-icon">t</div>
    <h2>Welcome to trio.ai</h2>
    <p>Your AI, everywhere. Ask me anything -- I can code, browse the web, search, analyze data, and automate tasks.</p>
    <div class="quick-actions">
      <button class="quick-btn" onclick="sendQuick('What can you do?')">What can you do?</button>
      <button class="quick-btn" onclick="sendQuick('Help me write a Python script')">Write Python</button>
      <button class="quick-btn" onclick="sendQuick('Search the web for latest AI news')">Search the web</button>
      <button class="quick-btn" onclick="sendQuick('Analyze this code for bugs')">Code review</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      class="input-box"
      id="messageInput"
      placeholder="Message trio.ai..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="footer-text">trio.ai v0.1.0 -- Native AI inference, 17 channels, 1900+ skills</div>
</div>

<script>
  const chatContainer = document.getElementById('chatContainer');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const welcomeScreen = document.getElementById('welcomeScreen');

  let sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();
  let isStreaming = false;

  // Auto-resize textarea
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 200) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendQuick(text) {
    messageInput.value = text;
    sendMessage();
  }

  function addMessage(role, content) {
    if (welcomeScreen) {
      welcomeScreen.remove();
    }

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `message-avatar ${role}`;
    avatar.textContent = role === 'user' ? 'U' : 't';

    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    contentDiv.innerHTML = formatContent(content);

    div.appendChild(avatar);
    div.appendChild(contentDiv);
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    return contentDiv;
  }

  function addTypingIndicator() {
    if (welcomeScreen) welcomeScreen.remove();

    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'typingMsg';

    const avatar = document.createElement('div');
    avatar.className = 'message-avatar assistant';
    avatar.textContent = 't';

    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    contentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    div.appendChild(avatar);
    div.appendChild(contentDiv);
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;

    return contentDiv;
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
  }

  function formatContent(text) {
    // Basic markdown: code blocks, inline code, bold, links
    text = text.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\n/g, '<br>');
    return text;
  }

  async function sendMessage() {
    const text = messageInput.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    messageInput.value = '';
    messageInput.style.height = 'auto';

    addMessage('user', text);
    const typingContent = addTypingIndicator();

    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      removeTypingIndicator();

      if (!res.ok) {
        const err = await res.json();
        addMessage('assistant', 'Error: ' + (err.error || 'Unknown error'));
        return;
      }

      // Read SSE stream
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      const contentDiv = addMessage('assistant', '');

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value, { stream: true });
        const lines = chunk.split('\n');

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const data = JSON.parse(line.slice(6));
            if (data.done) break;
            if (data.error) {
              fullText += ' [Error: ' + data.error + ']';
            } else if (data.text) {
              fullText += data.text;
            }
            contentDiv.innerHTML = formatContent(fullText);
            chatContainer.scrollTop = chatContainer.scrollHeight;
          } catch (e) {}
        }
      }
    } catch (err) {
      removeTypingIndicator();
      addMessage('assistant', 'Connection error. Is the server running?');
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      messageInput.focus();
    }
  }

  function clearChat() {
    chatContainer.innerHTML = `
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">t</div>
        <h2>Welcome to trio.ai</h2>
        <p>Your AI, everywhere. Ask me anything.</p>
        <div class="quick-actions">
          <button class="quick-btn" onclick="sendQuick('What can you do?')">What can you do?</button>
          <button class="quick-btn" onclick="sendQuick('Help me write a Python script')">Write Python</button>
          <button class="quick-btn" onclick="sendQuick('Search the web for latest AI news')">Search the web</button>
          <button class="quick-btn" onclick="sendQuick('Analyze this code for bugs')">Code review</button>
        </div>
      </div>`;
    sessionId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString();
    fetch('/api/sessions/clear', { method: 'POST' });
  }

  function showSettings() {
    fetch('/api/status')
      .then(r => r.json())
      .then(data => {
        alert(
          'trio.ai Status\n' +
          '──────────────\n' +
          'Provider: ' + data.provider + '\n' +
          'Model: ' + data.model + '\n' +
          'Sessions: ' + data.sessions + '\n' +
          'Version: ' + data.version
        );
      });
  }

  // Check server status on load
  fetch('/api/status')
    .then(r => r.json())
    .then(data => {
      document.getElementById('statusText').textContent = data.model + ' -- ready';
    })
    .catch(() => {
      document.getElementById('statusDot').style.background = '#ef4444';
      document.getElementById('statusText').textContent = 'Disconnected';
    });

  messageInput.focus();
</script>
</body>
</html>
